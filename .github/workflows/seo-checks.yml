name: SEO checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  seo:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx --yes playwright@1.47.0 install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start preview server
        run: |
          npx vite preview --host 127.0.0.1 --port 4173 &
          echo "PREVIEW_PID=$!" >> $GITHUB_ENV
          for i in {1..40}; do
            if curl -sf http://127.0.0.1:4173 >/dev/null; then
              echo "preview up"; exit 0
            fi
            sleep 0.5
          done
          echo "preview failed to start" >&2
          exit 1

      - name: Run SEO checks
        env:
          BASE_URL: http://127.0.0.1:4173
          CANONICAL_HOST: https://www.aionrings.com
        run: node scripts/seo-check.mjs

      - name: Stop preview server
        if: always()
        run: kill $PREVIEW_PID 2>/dev/null || true